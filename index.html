    <link rel="icon" type="image/png" href="/logo.png" />
  </head>
  <body>
    <canvas id="home-bg-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; display: none;"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        const canvas = document.getElementById('home-bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], fogLayers = [];

        function init() {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
          particles = [];
          for (let i = 0; i < 100; i++) {
            particles.push({
              x: Math.random() * width,
              y: Math.random() * height,
              size: Math.random() * 2 + 1,
              speedX: (Math.random() - 0.5) * 0.5,
              speedY: (Math.random() - 0.5) * 0.5,
              opacity: Math.random() * 0.5 + 0.2
            });
          }
          fogLayers = [];
          for (let i = 0; i < 5; i++) {
            fogLayers.push({
              x: Math.random() * width,
              y: Math.random() * height,
              size: Math.random() * 400 + 400,
              speedX: (Math.random() - 0.5) * 0.2,
              speedY: (Math.random() - 0.5) * 0.1,
              opacity: Math.random() * 0.05 + 0.02
            });
          }
        }

        function animate() {
          if (document.body.classList.contains('is-home')) {
            canvas.style.display = 'block';
            ctx.clearRect(0, 0, width, height);
            
            // Draw Fog
            ctx.fillStyle = '#0B0E11';
            fogLayers.forEach(fog => {
              const gradient = ctx.createRadialGradient(fog.x, fog.y, 0, fog.x, fog.y, fog.size);
              gradient.addColorStop(0, `rgba(11, 14, 17, ${fog.opacity})`);
              gradient.addColorStop(1, 'rgba(11, 14, 17, 0)');
              ctx.fillStyle = gradient;
              ctx.beginPath();
              ctx.arc(fog.x, fog.y, fog.size, 0, Math.PI * 2);
              ctx.fill();
              
              fog.x += fog.speedX;
              fog.y += fog.speedY;
              
              if (fog.x < -fog.size) fog.x = width + fog.size;
              if (fog.x > width + fog.size) fog.x = -fog.size;
              if (fog.y < -fog.size) fog.y = height + fog.size;
              if (fog.y > height + fog.size) fog.y = -fog.size;
            });

            // Draw Golden Dust
            particles.forEach(p => {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(242, 169, 0, ${p.opacity})`;
              ctx.fill();
              
              p.x += p.speedX;
              p.y += p.speedY;
              
              if (p.x < 0) p.x = width;
              if (p.x > width) p.x = 0;
              if (p.y < 0) p.y = height;
              if (p.y > height) p.y = 0;
            });
          } else {
            canvas.style.display = 'none';
          }
          requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
      })();
    </script>
  </body>
</html>
